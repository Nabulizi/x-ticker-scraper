name: CI

on:
  push:
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python modules
        run: |
          python -m py_compile \
            app.py scraper.py ticker_extractor.py tickers_db.py \
            price_lookup.py market_data.py sector_lookup.py signals.py \
            store.py scheduler.py import_cookies.py

      - name: Run offline regression tests
        run: |
          python test_scraper_parse.py
          python test_safety_regressions.py
